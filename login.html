<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Tech - Login</title>
  
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  
  <!-- Environment Variables from Render -->
  <script src="/env.js"></script>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Your existing styles here */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 480px;
    }
    
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
      border: 1px solid #e2e8f0;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #b45309, #d97706);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    .account-types {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      background: #f1f5f9;
      padding: 4px;
      border-radius: 50px;
    }
    
    .type-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      color: #64748b;
    }
    
    .type-btn.active {
      background: white;
      color: #b45309;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .step {
      display: none;
    }
    
    .step.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #334155;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #b45309;
      box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }
    
    .btn-primary {
      background: #b45309;
      color: white;
    }
    
    .btn-primary:hover {
      background: #92400e;
    }
    
    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
      margin-top: 10px;
    }
    
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }
    
    .status.success {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #86efac;
      display: block;
    }
    
    .status.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      display: block;
    }
    
    .status.info {
      background: #f0f9ff;
      color: #075985;
      border: 1px solid #bae6fd;
      display: block;
    }
    
    .code-input {
      text-align: center;
      font-size: 24px;
      letter-spacing: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>GOLDEN TECH</h1>
      </div>
      
      <div class="account-types">
        <button class="type-btn active" onclick="selectType('personal')">Personal</button>
        <button class="type-btn" onclick="selectType('store')">Store</button>
      </div>
      
      <!-- Personal Flow -->
      <div id="personalFlow">
        <div id="personalStep1" class="step active">
          <div class="form-group">
            <label>📧 Email Address</label>
            <input type="email" id="personalEmail" placeholder="your@email.com">
          </div>
          <button class="btn btn-primary" onclick="sendPersonalCode()">Send Code</button>
        </div>
        
        <div id="personalStep2" class="step">
          <div class="form-group">
            <label>🔐 Enter 6-Digit Code</label>
            <input type="text" id="personalCode" class="code-input" maxlength="6">
          </div>
          <button class="btn btn-primary" onclick="verifyPersonalCode()">Verify</button>
          <button class="btn btn-secondary" onclick="resetPersonal()">Back</button>
        </div>
      </div>
      
      <!-- Store Flow -->
      <div id="storeFlow" style="display: none;">
        <div id="storeStep1" class="step active">
          <div class="form-group">
            <label>🏬 Store Email</label>
            <input type="email" id="storeEmail" placeholder="store@example.com">
          </div>
          <button class="btn btn-primary" onclick="sendStoreCode()">Send Code</button>
        </div>
        
        <div id="storeStep2" class="step">
          <div class="form-group">
            <label>🔐 Enter 6-Digit Code</label>
            <input type="text" id="storeCode" class="code-input" maxlength="6">
          </div>
          <button class="btn btn-primary" onclick="verifyStoreCode()">Verify</button>
          <button class="btn btn-secondary" onclick="resetStore()">Back</button>
        </div>
      </div>
      
      <div id="statusMessage" class="status"></div>
    </div>
  </div>
  
  <script>
    // ==================== CHECK RENDER ENV ====================
    console.log('Render Environment Variables:', window.EMAILJS_CONFIG);
    
    if (!window.EMAILJS_CONFIG || !window.EMAILJS_CONFIG.publicKey) {
      document.getElementById('statusMessage').className = 'status error';
      document.getElementById('statusMessage').textContent = '❌ Environment variables not loaded. Check Render setup.';
    } else {
      // Initialize EmailJS
      emailjs.init(window.EMAILJS_CONFIG.publicKey);
      console.log('EmailJS initialized with public key from Render');
    }
    
    // ==================== STATE ====================
    let currentType = 'personal';
    let currentCode = '';
    let currentEmail = '';
    
    function selectType(type) {
      currentType = type;
      document.querySelectorAll('.type-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(type));
      });
      document.getElementById('personalFlow').style.display = type === 'personal' ? 'block' : 'none';
      document.getElementById('storeFlow').style.display = type === 'store' ? 'block' : 'none';
    }
    
    function showStatus(msg, type) {
      const status = document.getElementById('statusMessage');
      status.className = 'status ' + type;
      status.textContent = msg;
    }
    
    function generateCode() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    async function sendEmail(email, code) {
      try {
        showStatus('📧 Sending...', 'info');
        
        const response = await emailjs.send(
          window.EMAILJS_CONFIG.serviceId,
          window.EMAILJS_CONFIG.templateId,
          {
            to_email: email,
            to_name: email.split('@')[0],
            code: code
          }
        );
        
        if (response.status === 200) {
          showStatus(`✅ Code sent to ${email}`, 'success');
          return true;
        }
        return false;
      } catch (error) {
        console.error('Email error:', error);
        showStatus('❌ Failed to send. Check Render env variables.', 'error');
        return false;
      }
    }
    
    // ==================== PERSONAL ====================
    async function sendPersonalCode() {
      const email = document.getElementById('personalEmail').value;
      if (!email || !email.includes('@')) {
        showStatus('❌ Valid email required', 'error');
        return;
      }
      
      currentEmail = email;
      currentCode = generateCode();
      
      if (await sendEmail(email, currentCode)) {
        document.getElementById('personalStep1').classList.remove('active');
        document.getElementById('personalStep2').classList.add('active');
      }
    }
    
    function verifyPersonalCode() {
      const code = document.getElementById('personalCode').value;
      if (code === currentCode) {
        showStatus(`✅ Welcome ${currentEmail}!`, 'success');
        setTimeout(resetAll, 2000);
      } else {
        showStatus('❌ Wrong code', 'error');
      }
    }
    
    function resetPersonal() {
      document.getElementById('personalStep1').classList.add('active');
      document.getElementById('personalStep2').classList.remove('active');
      document.getElementById('personalEmail').value = '';
      document.getElementById('personalCode').value = '';
    }
    
    // ==================== STORE ====================
    async function sendStoreCode() {
      const email = document.getElementById('storeEmail').value;
      if (!email || !email.includes('@')) {
        showStatus('❌ Valid email required', 'error');
        return;
      }
      
      currentEmail = email;
      currentCode = generateCode();
      
      if (await sendEmail(email, currentCode)) {
        document.getElementById('storeStep1').classList.remove('active');
        document.getElementById('storeStep2').classList.add('active');
      }
    }
    
    function verifyStoreCode() {
      const code = document.getElementById('storeCode').value;
      if (code === currentCode) {
        showStatus(`✅ Welcome ${currentEmail}!`, 'success');
        setTimeout(resetAll, 2000);
      } else {
        showStatus('❌ Wrong code', 'error');
      }
    }
    
    function resetStore() {
      document.getElementById('storeStep1').classList.add('active');
      document.getElementById('storeStep2').classList.remove('active');
      document.getElementById('storeEmail').value = '';
      document.getElementById('storeCode').value = '';
    }
    
    function resetAll() {
      selectType('personal');
      resetPersonal();
      resetStore();
    }
  </script>
</body>
</html>
