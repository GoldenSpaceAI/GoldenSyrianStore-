<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Test - Golden Tech</title>
  
  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 500px;
    }
    
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    
    .account-type {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .type-btn {
      flex: 1;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .type-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }
    
    .type-btn.personal.active {
      background: #48bb78;
      border-color: #48bb78;
    }
    
    .type-btn.store.active {
      background: #ed8936;
      border-color: #ed8936;
    }
    
    .form-step {
      display: none;
    }
    
    .form-step.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      margin-bottom: 10px;
    }
    
    button:hover {
      background: #5a67d8;
    }
    
    button.secondary {
      background: #e0e0e0;
      color: #333;
    }
    
    button.secondary:hover {
      background: #d0d0d0;
    }
    
    .verification-status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      display: none;
    }
    
    .verification-status.success {
      background: #c6f6d5;
      color: #22543d;
      display: block;
    }
    
    .verification-status.error {
      background: #fed7d7;
      color: #742a2a;
      display: block;
    }
    
    .info-box {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      font-size: 0.9rem;
    }
    
    .reset-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .reset-link a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🔐 Golden Tech</h1>
      <p class="subtitle">Email Verification Test - No Data Stored</p>
      
      <!-- Account Type Selection -->
      <div class="account-type">
        <button class="type-btn personal active" onclick="selectType('personal')">👤 Personal Account</button>
        <button class="type-btn store" onclick="selectType('store')">🏬 Store Account</button>
      </div>
      
      <!-- Personal Account Flow -->
      <div id="personalFlow" class="form-step active">
        <!-- Step 1: Email Input -->
        <div id="personalStep1" class="form-step active">
          <div class="form-group">
            <label>📧 Email Address</label>
            <input type="email" id="personalEmail" placeholder="your@email.com">
          </div>
          <button onclick="sendPersonalCode()" id="personalSendBtn">Send Verification Code</button>
        </div>
        
        <!-- Step 2: Code Verification -->
        <div id="personalStep2" class="form-step">
          <div class="form-group">
            <label>🔢 Enter 4-Digit Code</label>
            <input type="text" id="personalCode" placeholder="1234" maxlength="4">
          </div>
          <button onclick="verifyPersonalCode()" id="personalVerifyBtn">Verify & Login</button>
          <button class="secondary" onclick="resetPersonal()">← Back</button>
        </div>
      </div>
      
      <!-- Store Account Flow -->
      <div id="storeFlow" class="form-step">
        <!-- Step 1: Email Input -->
        <div id="storeStep1" class="form-step active">
          <div class="form-group">
            <label>📧 Store Email Address</label>
            <input type="email" id="storeEmail" placeholder="store@example.com">
          </div>
          <button onclick="sendStoreCode()" id="storeSendBtn">Send Verification Code</button>
        </div>
        
        <!-- Step 2: Code Verification -->
        <div id="storeStep2" class="form-step">
          <div class="form-group">
            <label>🔢 Enter 4-Digit Code</label>
            <input type="text" id="storeCode" placeholder="1234" maxlength="4">
          </div>
          <button onclick="verifyStoreCode()" id="storeVerifyBtn">Verify & Login</button>
          <button class="secondary" onclick="resetStore()">← Back</button>
        </div>
      </div>
      
      <!-- Verification Status -->
      <div id="verificationStatus" class="verification-status"></div>
      
      <!-- Info Box (Setup Instructions) -->
      <div class="info-box" id="setupInfo">
        <strong>🔧 Setup Required:</strong><br>
        1. Get your EmailJS keys<br>
        2. Add them below<br>
        3. Test sending to yourself!
      </div>
      
      <!-- EmailJS Config Form -->
      <div class="info-box" style="margin-top: 20px;">
        <h3 style="margin-bottom: 15px;">⚙️ EmailJS Configuration</h3>
        
        <div class="form-group">
          <label>Public Key</label>
          <input type="text" id="publicKey" placeholder="user_abc123..." value="M71i2pQz54jgFq7qV">
        </div>
        
        <div class="form-group">
          <label>Service ID</label>
          <input type="text" id="serviceId" placeholder="service_abc123..." value="service_0felh4d">
        </div>
        
        <div class="form-group">
          <label>Template ID</label>
          <input type="text" id="templateId" placeholder="template_abc123..." value="template_qvzjnbl">
        </div>
        
        <button onclick="saveConfig()" style="background: #48bb78;">Save Configuration</button>
      </div>
      
      <!-- Reset Link -->
      <div class="reset-link">
        <a href="#" onclick="resetAll()">🔄 Start Over</a>
      </div>
    </div>
  </div>
  
  <script>
    // ==================== STATE ====================
    let currentType = 'personal';
    let currentCode = '';
    let currentEmail = '';
    
    // EmailJS config (will be set by user)
    let emailjsConfig = {
      publicKey: '',
      serviceId: '',
      templateId: ''
    };
    
    // ==================== INIT ====================
    // Load saved config if any
    const saved = localStorage.getItem('emailjsConfig');
    if (saved) {
      emailjsConfig = JSON.parse(saved);
      document.getElementById('publicKey').value = emailjsConfig.publicKey;
      document.getElementById('serviceId').value = emailjsConfig.serviceId;
      document.getElementById('templateId').value = emailjsConfig.templateId;
      
      // Initialize EmailJS
      if (emailjsConfig.publicKey) {
        emailjs.init(emailjsConfig.publicKey);
      }
    }
    
    // ==================== FUNCTIONS ====================
    function selectType(type) {
      currentType = type;
      document.querySelector('.type-btn.personal').classList.toggle('active', type === 'personal');
      document.querySelector('.type-btn.store').classList.toggle('active', type === 'store');
      document.getElementById('personalFlow').classList.toggle('active', type === 'personal');
      document.getElementById('storeFlow').classList.toggle('active', type === 'store');
      hideStatus();
    }
    
    function saveConfig() {
      emailjsConfig = {
        publicKey: document.getElementById('publicKey').value,
        serviceId: document.getElementById('serviceId').value,
        templateId: document.getElementById('templateId').value
      };
      
      // Save to localStorage
      localStorage.setItem('emailjsConfig', JSON.stringify(emailjsConfig));
      
      // Initialize EmailJS
      if (emailjsConfig.publicKey) {
        emailjs.init(emailjsConfig.publicKey);
      }
      
      showStatus('✅ Configuration saved!', 'success');
    }
    
    function generateCode() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }
    
    async function sendEmail(email, code) {
      if (!emailjsConfig.publicKey || !emailjsConfig.serviceId || !emailjsConfig.templateId) {
        showStatus('❌ Please configure EmailJS first', 'error');
        return false;
      }
      
      try {
        showStatus('📧 Sending email...', 'success');
        
        const response = await emailjs.send(
          emailjsConfig.serviceId,
          emailjsConfig.templateId,
          {
            to_email: email,
            to_name: email.split('@')[0],
            code: code
          }
        );
        
        console.log('Email sent:', response);
        return true;
      } catch (error) {
        console.error('Email error:', error);
        showStatus('❌ Failed to send email. Check your configuration.', 'error');
        return false;
      }
    }
    
    // ==================== PERSONAL ACCOUNT ====================
    async function sendPersonalCode() {
      const email = document.getElementById('personalEmail').value;
      
      if (!email || !email.includes('@')) {
        showStatus('Please enter a valid email', 'error');
        return;
      }
      
      currentEmail = email;
      currentCode = generateCode();
      
      const sent = await sendEmail(email, currentCode);
      
      if (sent) {
        document.getElementById('personalStep1').classList.remove('active');
        document.getElementById('personalStep2').classList.add('active');
        showStatus(`✅ Code sent to ${email}`, 'success');
      }
    }
    
    function verifyPersonalCode() {
      const code = document.getElementById('personalCode').value;
      
      if (code === currentCode) {
        showStatus(`✅ Logged in as ${currentEmail} (Personal Account)`, 'success');
        console.log('Login success:', { type: 'personal', email: currentEmail });
        
        // Auto reset after 3 seconds
        setTimeout(() => {
          resetAll();
          showStatus('Test complete - you can try again', 'success');
        }, 3000);
      } else {
        showStatus('❌ Wrong code. Please check your email and try again.', 'error');
      }
    }
    
    function resetPersonal() {
      document.getElementById('personalStep1').classList.add('active');
      document.getElementById('personalStep2').classList.remove('active');
      document.getElementById('personalEmail').value = '';
      document.getElementById('personalCode').value = '';
      currentCode = '';
      hideStatus();
    }
    
    // ==================== STORE ACCOUNT ====================
    async function sendStoreCode() {
      const email = document.getElementById('storeEmail').value;
      
      if (!email || !email.includes('@')) {
        showStatus('Please enter a valid email', 'error');
        return;
      }
      
      currentEmail = email;
      currentCode = generateCode();
      
      const sent = await sendEmail(email, currentCode);
      
      if (sent) {
        document.getElementById('storeStep1').classList.remove('active');
        document.getElementById('storeStep2').classList.add('active');
        showStatus(`✅ Code sent to ${email}`, 'success');
      }
    }
    
    function verifyStoreCode() {
      const code = document.getElementById('storeCode').value;
      
      if (code === currentCode) {
        showStatus(`✅ Logged in as ${currentEmail} (Store Account)`, 'success');
        console.log('Login success:', { type: 'store', email: currentEmail });
        
        // Auto reset after 3 seconds
        setTimeout(() => {
          resetAll();
          showStatus('Test complete - you can try again', 'success');
        }, 3000);
      } else {
        showStatus('❌ Wrong code. Please check your email and try again.', 'error');
      }
    }
    
    function resetStore() {
      document.getElementById('storeStep1').classList.add('active');
      document.getElementById('storeStep2').classList.remove('active');
      document.getElementById('storeEmail').value = '';
      document.getElementById('storeCode').value = '';
      currentCode = '';
      hideStatus();
    }
    
    // ==================== UTILITIES ====================
    function showStatus(message, type) {
      const status = document.getElementById('verificationStatus');
      status.className = 'verification-status ' + type;
      status.innerHTML = message;
      status.style.display = 'block';
    }
    
    function hideStatus() {
      document.getElementById('verificationStatus').style.display = 'none';
    }
    
    function resetAll() {
      selectType('personal');
      resetPersonal();
      resetStore();
      hideStatus();
    }
  </script>
</body>
</html>
