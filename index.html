<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🏆 Golden Syrian Tech | جولدن سيـريان تك</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    /* Custom Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cairo', 'Tajawal', sans-serif;
      background-color: #f9fafb;
      direction: ltr;
    }
    
    /* Arabic direction */
    body.rtl {
      direction: rtl;
      font-family: 'Tajawal', 'Cairo', sans-serif;
    }
    
    /* Gold gradient */
    .gold-bg {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
    }
    
    .gold-text {
      color: #FFD700;
    }
    
    .gold-border {
      border-color: #FFD700;
    }
    
    /* WhatsApp button */
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      background-color: #25D366;
      color: white;
      padding: 15px 20px;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }
    
    .whatsapp-btn:hover {
      background-color: #128C7E;
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(18, 140, 126, 0.4);
    }
    
    /* Product card hover */
    .product-card {
      transition: all 0.3s ease;
    }
    
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    /* Language switch button */
    .lang-switch {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      background: white;
      padding: 10px 15px;
      border-radius: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      font-weight: bold;
      border: 2px solid #FFD700;
    }
    
    .lang-switch:hover {
      background: #FFD700;
    }
    
    /* Loading spinner */
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #FFD700;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Order steps */
    .step {
      flex: 1;
      text-align: center;
      position: relative;
    }
    
    .step.completed .step-icon {
      background-color: #10B981;
      color: white;
    }
    
    .step.active .step-icon {
      background-color: #FFD700;
      color: black;
    }
    
    .step-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-weight: bold;
    }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
      .lang-switch {
        top: 10px;
        right: 10px;
        padding: 5px 10px;
        font-size: 14px;
      }
      
      .whatsapp-btn {
        padding: 12px 15px;
        font-size: 14px;
        bottom: 15px;
        right: 15px;
      }
      
      .whatsapp-btn span {
        display: none;
      }
      
      .whatsapp-btn i {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Language Switcher -->
  <div class="lang-switch" id="langSwitch" onclick="toggleLanguage()">
    <span id="langText">🇸🇾 العربية</span>
  </div>
  
  <!-- Loading Spinner (hidden by default) -->
  <div id="loader" class="loader" style="display: none;"></div>
  
  <!-- React Root -->
  <div id="root"></div>
  
  <!-- WhatsApp Button -->
  <a href="https://wa.me/963962060530" target="_blank" class="whatsapp-btn" id="whatsappBtn">
    <i class="fab fa-whatsapp" style="font-size: 24px;"></i>
    <span>Chat on WhatsApp</span>
  </a>
  
  <!-- Simple JavaScript for Language Switch -->
  <script>
    function toggleLanguage() {
      const body = document.body;
      const langText = document.getElementById('langText');
      const whatsappBtn = document.getElementById('whatsappBtn');
      
      if (body.classList.contains('rtl')) {
        // Switch to English
        body.classList.remove('rtl');
        langText.textContent = '🇸🇾 العربية';
        document.documentElement.lang = 'en';
        whatsappBtn.querySelector('span').textContent = 'Chat on WhatsApp';
      } else {
        // Switch to Arabic
        body.classList.add('rtl');
        langText.textContent = '🇬🇧 English';
        document.documentElement.lang = 'ar';
        whatsappBtn.querySelector('span').textContent = 'دردشة واتساب';
      }
      
      // Trigger custom event for React to update
      window.dispatchEvent(new Event('languageChange'));
    }
    
    // Show loader when navigating
    window.addEventListener('beforeunload', function() {
      document.getElementById('loader').style.display = 'block';
    });
  </script>
  
  <!-- Main React Script -->
  <script type="module" src="/index.jsx"></script>
</body>
</html>
