<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Golden Syrian Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background-color: #f9fafb; }
    .gold-bg { background: linear-gradient(135deg, #FFD700, #FFA500); }
    .product-card { transition: all 0.3s ease; background: white; border-radius: 1rem; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .cart-icon { position: relative; cursor: pointer; }
    .cart-count { position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .cart-dropdown { position: absolute; top: 50px; right: 0; width: 350px; background: white; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; z-index: 1000; border: 1px solid #e5e7eb; }
    .cart-dropdown.show { display: block; }
    .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; z-index: 1000; background: #25D366; color: white; padding: 15px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
    .whatsapp-btn:hover { background: #128C7E; }
    @media (max-width: 768px) { .whatsapp-btn span { display: none; } }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Header with Cart -->
  <header class="gold-bg text-white p-4 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl md:text-3xl font-black">🏆 GOLDEN SYRIAN TECH</h1>
      <div class="cart-icon relative" id="cartIcon">
        <i class="fas fa-shopping-cart text-2xl"></i>
        <span class="cart-count" id="cartCount">0</span>
        
        <!-- Cart Dropdown -->
        <div class="cart-dropdown" id="cartDropdown">
          <div class="p-4">
            <h3 class="font-bold text-lg mb-3">🛒 Your Cart</h3>
            <div id="cartItems" class="max-h-60 overflow-y-auto"></div>
            <div class="mt-4 pt-3 border-t">
              <div class="flex justify-between font-bold text-lg">
                <span>Total:</span>
                <span id="cartTotal">$0</span>
              </div>
              <a href="/checkout.html" class="block w-full bg-green-500 text-white text-center py-3 rounded-lg mt-4 font-bold hover:bg-green-600 transition">
                ✅ Proceed to Checkout
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Products Grid -->
  <main class="container mx-auto p-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="productsGrid"></div>
  </main>

  <!-- WhatsApp Button -->
  <a href="https://wa.me/963962060530" target="_blank" class="whatsapp-btn">
    <i class="fab fa-whatsapp text-2xl"></i>
    <span>Chat on WhatsApp</span>
  </a>

  <script>
    // Products data
    const products = [
      { id: 1, name: '🎮 PS5 Console', price: 570, image: 'https://placehold.co/400x300/FFD700/white?text=PS5' },
      { id: 2, name: '📺 Haier 65" QLED 4K TV', price: 550, image: 'https://i.ibb.co/j9j6hPyg/tv.jpg' },
      { id: 3, name: '🧹 Vacuum Cleaner', price: 120, image: 'https://placehold.co/400x300/FFD700/white?text=Vacuum' },
      { id: 4, name: '🎧 Gaming Headset', price: 40, image: 'https://placehold.co/400x300/FFD700/white?text=Headset' },
      { id: 5, name: '📱 iPhone 13', price: 630, image: 'https://placehold.co/400x300/FFD700/white?text=iPhone' },
    ];

    // Cart state
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    // Render products
    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <img src="${p.image}" alt="${p.name}" class="w-full h-48 object-contain bg-gray-100 p-4">
          <div class="p-4">
            <h3 class="font-bold text-lg">${p.name}</h3>
            <p class="text-2xl font-bold text-yellow-600 my-2">$${p.price}</p>
            <button onclick="addToCart(${p.id})" class="w-full bg-yellow-500 text-white py-2 rounded-lg font-bold hover:bg-yellow-600 transition">
              🛒 Add to Cart
            </button>
          </div>
        </div>
      `).join('');
    }

    // Add to cart
    window.addToCart = function(id) {
      const product = products.find(p => p.id === id);
      cart.push(product);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartUI();
    };

    // Remove from cart
    window.removeFromCart = function(index) {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartUI();
    };

    // Update cart UI
    function updateCartUI() {
      document.getElementById('cartCount').textContent = cart.length;
      
      const cartItems = document.getElementById('cartItems');
      const cartTotal = document.getElementById('cartTotal');
      
      if (cart.length === 0) {
        cartItems.innerHTML = '<p class="text-gray-500 text-center py-4">Your cart is empty</p>';
        cartTotal.textContent = '$0';
      } else {
        cartItems.innerHTML = cart.map((item, index) => `
          <div class="flex justify-between items-center py-2 border-b">
            <span class="truncate">${item.name}</span>
            <div class="flex items-center gap-3">
              <span class="font-bold">$${item.price}</span>
              <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-700">✕</button>
            </div>
          </div>
        `).join('');
        
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        cartTotal.textContent = `$${total}`;
      }
    }

    // Toggle cart dropdown
    document.getElementById('cartIcon').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('cartDropdown').classList.toggle('show');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.cart-icon')) {
        document.getElementById('cartDropdown').classList.remove('show');
      }
    });

    // Initial render
    renderProducts();
    updateCartUI();
  </script>
</body>
</html>
